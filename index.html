<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micloud - Personal Drive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f3f4f6; color: #1f2937; display: flex; height: 100vh; overflow: hidden; }

        /* Auth Screen */
        #authSection { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .auth-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        .auth-card h2 { margin-bottom: 5px; color: #1f2937; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-google { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; background: white; color: #374151; border: 1px solid #d1d5db; border-radius: 8px; font-weight: 500; cursor: pointer; transition: 0.3s; font-size: 16px; margin-top: 20px;}
        .btn-google:hover { background: #f9fafb; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-google img { width: 24px; }
        #errorMsg { color: #dc2626; font-size: 14px; display: none; margin-bottom: 10px; }

        /* App Layout */
        #appSection { display: none; width: 100%; height: 100vh; flex-direction: column; }
        .navbar { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; }
        .brand { font-size: 20px; font-weight: 600; color: #4f46e5; display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-profile { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
        .user-profile img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #e0e7ff; }
        .btn-logout { background: #fee2e2; color: #dc2626; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 500; }

        .main-content { flex: 1; overflow-y: auto; padding: 30px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .page-title { font-size: 24px; font-weight: 600; }
        .action-buttons { display: flex; gap: 15px; align-items: center; }
        .btn-upload { background: #10b981; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; gap: 8px; font-size: 15px; }
        .btn-upload input[type="file"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        #progressText { color: #4f46e5; font-weight: 600; font-size: 14px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .card:hover { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transform: translateY(-3px); }
        .preview-area { height: 140px; background: #f8fafc; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #e5e7eb; overflow: hidden; font-size: 50px; }
        .preview-area img, .preview-area video { width: 100%; height: 100%; object-fit: cover; }
        .icon-pdf { color: #ef4444; } .icon-audio { color: #f59e0b; } .icon-default { color: #64748b; }
        .card-details { padding: 12px; text-align: center; }
        .card-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 10px; }
        .card-actions { display: flex; gap: 5px; justify-content: center; }
        .btn-icon { flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: white; text-decoration: none; }
        .btn-view { background: #4f46e5; } .btn-del { background: #dc2626; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; grid-column: 1 / -1; }
        .empty-state i { font-size: 50px; margin-bottom: 15px; }

        @media (max-width: 600px) { .navbar { flex-direction: column; gap: 15px; } .top-bar { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card">
            <h2><i class="fa-solid fa-cloud"></i> Micloud</h2>
            <p>Free & Secure Cloud Storage</p>
            <div id="errorMsg">Login Failed! Try again.</div>
            <button id="googleLoginBtn" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                Sign in with Google
            </button>
        </div>
    </div>

    <div id="appSection">
        <div class="navbar">
            <div class="brand"><i class="fa-solid fa-cloud"></i> Micloud</div>
            <div class="user-info">
                <div class="user-profile">
                    <img id="userImage" src="" alt="User">
                    <span id="userNameDisplay"></span>
                </div>
                <button id="logoutBtn" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <div class="page-title">My Uploads</div>
                <div class="action-buttons">
                    <button class="btn-upload" id="uploadWrapper">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Upload File
                        <input type="file" id="fileInput" accept="video/*, image/*, audio/*, application/pdf">
                    </button>
                    <span id="progressText"></span>
                </div>
            </div>
            <div class="grid-container" id="fileList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // CLOUDINARY SETUP (For Free Unlimited File Storage)
        // ==========================================
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dqzx541to/upload";
        // Dhyan de: Agar aapne preset ka naam kuch aur rakha hai, toh yahan badal lein.
        const CLOUDINARY_UPLOAD_PRESET = "my_drive_123"; 

        // ==========================================
        // FIREBASE SETUP (For Database & Google Login)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCzmK8CP4y5wJTCoR8CBG7Rerqm66LZrL8",
            authDomain: "micloud-7e629.firebaseapp.com",
            projectId: "micloud-7e629",
            storageBucket: "micloud-7e629.firebasestorage.app",
            messagingSenderId: "249751133311",
            appId: "1:249751133311:web:532ef83ffc6cdea6f6734a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        let currentUser = null;

        // UI Elements
        const authSection = document.getElementById('authSection');
        const appSection = document.getElementById('appSection');
        const fileList = document.getElementById('fileList');
        const progressText = document.getElementById('progressText');
        const fileInput = document.getElementById('fileInput');
        const uploadWrapper = document.getElementById('uploadWrapper');

        // --- AUTHENTICATION (Google Login) ---
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            try { 
                document.getElementById('errorMsg').style.display = "none";
                await signInWithPopup(auth, provider); 
            } 
            catch (error) { 
                console.error("Login Error:", error); 
                document.getElementById('errorMsg').style.display = "block"; 
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { signOut(auth); });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authSection.style.display = "none";
                appSection.style.display = "flex";
                document.getElementById('userNameDisplay').innerText = user.displayName;
                document.getElementById('userImage').src = user.photoURL;
                fetchFiles();
            } else {
                currentUser = null;
                authSection.style.display = "flex";
                appSection.style.display = "none";
            }
        });

        // --- UPLOAD TO CLOUDINARY ---
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !currentUser) return;

            // UI feedback
            uploadWrapper.style.opacity = "0.5";
            uploadWrapper.style.pointerEvents = "none";
            progressText.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Uploading...`;

            // Prepare Cloudinary Data
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

            // Fetch API to send file directly to Cloudinary
            fetch(CLOUDINARY_URL, { method: "POST", body: formData })
            .then(response => response.json())
            .then(async (data) => {
                if(data.secure_url) {
                    // Save the secure link and file name to Firebase Firestore
                    await addDoc(collection(db, "myDriveData"), {
                        uid: currentUser.uid, 
                        fileName: file.name,
                        fileUrl: data.secure_url,
                        fileType: file.type,
                        timestamp: Date.now()
                    });

                    progressText.innerHTML = '<i class="fa-solid fa-check" style="color:green;"></i> Success!';
                    setTimeout(() => { progressText.innerText = ""; }, 3000);
                    resetUploadBtn();
                    fetchFiles(); 
                } else {
                    throw new Error("Upload Failed: Check Preset Settings");
                }
            })
            .catch((error) => {
                progressText.innerText = "Error: Did you set Unsigned Preset?";
                progressText.style.color = "red";
                console.error(error);
                resetUploadBtn();
            });
        });

        function resetUploadBtn() {
            fileInput.value = "";
            uploadWrapper.style.opacity = "1";
            uploadWrapper.style.pointerEvents = "auto";
        }

        // --- FETCH FILES FROM FIREBASE ---
        async function fetchFiles() {
            if(!currentUser) return;
            
            // Get files only for logged in user
            const q = query(collection(db, "myDriveData"), where("uid", "==", currentUser.uid));
            const querySnapshot = await getDocs(q);
            
            const filesData = [];
            querySnapshot.forEach((doc) => filesData.push({ id: doc.id, ...doc.data() }));
            
            // Sort files newest first
            filesData.sort((a, b) => b.timestamp - a.timestamp);

            fileList.innerHTML = ""; 
            
            if (filesData.length === 0) {
                fileList.innerHTML = `<div class="empty-state"><i class="fa-solid fa-folder-open"></i><p>Your drive is empty.</p></div>`;
                return;
            }

            filesData.forEach((data) => {
                let previewHTML = `<i class="fa-solid fa-file icon-default"></i>`;
                
                // Show real preview for photos/videos
                if(data.fileType.includes("image")) {
                    previewHTML = `<img src="${data.fileUrl}" alt="img">`;
                } else if(data.fileType.includes("video")) {
                    previewHTML = `<video src="${data.fileUrl}" muted></video><div style="position:absolute; background:rgba(0,0,0,0.5); padding:10px; border-radius:50%; color:white;"><i class="fa-solid fa-play"></i></div>`;
                } else if(data.fileType.includes("audio")) {
                    previewHTML = `<i class="fa-solid fa-file-audio icon-audio"></i>`;
                } else if(data.fileType.includes("pdf")) {
                    previewHTML = `<i class="fa-solid fa-file-pdf icon-pdf"></i>`;
                }

                const fileCard = document.createElement('div');
                fileCard.className = 'card';
                fileCard.innerHTML = `
                    <div class="preview-area" style="position:relative;">${previewHTML}</div>
                    <div class="card-details">
                        <div class="card-title" title="${data.fileName}">${data.fileName}</div>
                        <div class="card-actions">
                            <a href="${data.fileUrl}" target="_blank" class="btn-icon btn-view"><i class="fa-solid fa-eye"></i> View</a>
                            <button class="btn-icon btn-del" data-id="${data.id}"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
                fileList.appendChild(fileCard);
            });

            // Handle Delete Action
            document.querySelectorAll('.btn-del').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const button = e.currentTarget;
                    const docId = button.getAttribute('data-id');
                    
                    if(confirm("Are you sure you want to delete this file?")) {
                        button.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                        try {
                            await deleteDoc(doc(db, "myDriveData", docId)); 
                            fetchFiles(); // Refresh UI
                        } catch(error) {
                            alert("Error deleting file.");
                            button.innerHTML = '<i class="fa-solid fa-trash"></i>';
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
